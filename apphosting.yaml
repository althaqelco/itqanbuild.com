# Firebase App Hosting — Cloud Run + Cloud CDN
# Region: me-central2 (Dammam) closest to Jeddah for lowest TTFB
runConfig:
  minInstances: 1
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://itqanbuild.com
  - variable: NEXT_PUBLIC_GA4_ID
    value: G-G55B7C5N9L
  - variable: NEXT_TELEMETRY_DISABLED
    value: "1"
