# Firebase App Hosting — Cloud Run + Cloud CDN
# ملاحظة: الـ region يُحدَّد عند إنشاء الـ backend (فعلياً asia-southeast1)، لا من هنا.
# 💰 minInstances: 0 — الموقع محتوى ثابت بالكامل (SEO/مدونة، لا API/webhooks/cron)،
#    فلا شيء خادمي يحتاج instance دائماً صاحياً. الـ instance الدائم كان يستهلك ~$9/شهر
#    (كامل الفاتورة تقريباً). مع 0: يُحاسَب على المعالجة فقط + CDN يخدم الصفحات المخزّنة؛
#    الكلفة الوحيدة cold-start نادر على صفحة غير مخزّنة (ثوانٍ) — صفر فقدان وظيفة.
runConfig:
  minInstances: 0
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NEXT_PUBLIC_SITE_URL
    value: https://itqanbuild.com
  - variable: NEXT_PUBLIC_GA4_ID
    value: G-G55B7C5N9L
  - variable: NEXT_TELEMETRY_DISABLED
    value: "1"
